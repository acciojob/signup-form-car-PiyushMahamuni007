<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form>
		<label for='name'>Name</label>
		<input placeholder='Name' type='text' id='name' name='name' required >
		<label for='email'>Email</label>
		<input placeholder='Email' type='email' id='email' name='email' required >
		<label for='gender_m'>Male</label>
		<input  type='radio' id='gender_m' name='gender' required >
		<label for='gender_f'>Female</label>
		<input  type='radio' id='gender_f' name='gender' required >
		<label for='cars'>Cars</label>
		<select placeholder='--Please choose an option--' id='cars' required >
			<option>BMW</option>
			<option>Ferrari</option>
			<option>MG</option>
		</select>


		<label for='age'>Age</label>
		<input placeholder='Age' type='number' id='age' name='age' required >
		<label for='dob'>DOB</label>
		<input  type='date' id='dob' name='dob' required >
		<label for='tel'>Phone Number</label>
		<input placeholder='xxx-xxx-xxxx' type='tel' id='tel' name='tel'  >
		<label for='password'>Password</label>
		<input placeholder='Password' type='password' id='password' name='password' required >
		<label for='tos'>I agree to the TOS</label>
		<input type='checkbox' required id='tos'>
		


		
	</form>


	
    <script type="text/javascript" src="./script.js">
		
</script>

</body>

</html>
